name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (full on push, changed files on PR)
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npm run lint:changed
          else
            npm run lint
          fi

      - name: Check formatting with Prettier (full on push, changed files on PR)
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npm run format:changed
          else
            npm run format:check
          fi

      - name: Build
        run: npm run build
        env:
          NUXT_TELEMETRY_DISABLED: 1
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_ADMIN_KEY: ${{ secrets.SUPABASE_ADMIN_KEY }}
          GCP_ENDPOINT: https://app.crown-procurement.com
          VERCEL_URL: app.crown-procurement.com

      - name: Slack notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: 'CI ${{ job.status }} for ${{ github.repository }}'
          SLACK_MESSAGE: |
            Event: ${{ github.event_name }}
            Branch: `${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}`
            Actor: ${{ github.actor }}
            ${{ github.event_name == 'push' && format('Commit: {0}', github.event.head_commit.message) || '' }}
          SLACK_FOOTER: 'Crown CI'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL: http://localhost:3000
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_KEY }}
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
